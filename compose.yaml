# https://github.com/docker/awesome-compose/blob/master/nginx-flask-mysql/backend/Dockerfile
# https://github.com/docker/awesome-compose/blob/master/nginx-flask-mysql/compose.yaml
services:
  db:
    image: mariadb:10-focal
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'mariadb-admin ping -h 127.0.0.1 --password="$$(cat /run/secrets/db-password)" --silent']
      interval: 3s
      retries: 5
      start_period: 30s
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - db
    environment:
      - MYSQL_DATABASE=deco
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db-password
#    expose:
#      - 3306
#      - 33060

  web:
    build:
      context: backend
      target: builder
    networks:
      - db
      - backnet
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: on-failure
    volumes:
     - ./nginx.conf:/etc/nginx/conf.d/default.conf
     - ./frontend:/www/data
    ports:
     - "8000:80"
    networks:
     - backnet
     - frontnet

volumes:
  db-data:

secrets:
  db-password:
    file: backend/db-password.txt

networks:
  backnet:
  frontnet:
  db:
